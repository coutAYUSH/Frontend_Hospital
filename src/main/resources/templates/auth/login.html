<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — MediCare HMS</title>
    <meta name="description" content="Sign in to the Hospital Management System"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="login-page">
    <!-- Background blobs -->
    <div class="login-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="login-logo">
            <div class="logo-circle">🏥</div>
            <h1>MediCare HMS</h1>
            <p>Hospital Management System</p>
        </div>

        <!-- Error message -->
        <div class="alert-error" th:if="${error}">
            <span>⚠️</span>
            <span th:text="${error}">Error message</span>
        </div>

        <form method="post" th:action="@{/login}" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="doctor@hospital.com" required autocomplete="email"/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" required autocomplete="current-password"/>
            </div>
            <button type="submit" class="login-submit" id="loginBtn">Sign In →</button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted)">
            Secure hospital staff portal. Authorized personnel only.
        </p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Signing in…';
        btn.disabled = true;
    });
</script>

</body>
</html>
