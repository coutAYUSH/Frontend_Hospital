<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prescriptions — MediCare HMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{layout/sidebar :: sidebar(${activeTab}, ${role}, ${userEmail})}"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <h1>💊 Prescriptions</h1>
        <p>Medications you have prescribed</p>
      </div>
      <span class="topbar-badge">Physician</span>
    </div>

    <div class="page-content">
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>#</th>
            <th>Patient</th>
            <th>Medication</th>
            <th>Dose</th>
            <th>Date</th>
            <th>Appointment</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="rx, iStat : ${prescribes}">
            <td th:text="${iStat.count}" style="color:var(--text-muted)"></td>
            <td th:text="${rx.patient}">—</td>
            <td style="font-weight:500;color:var(--text-primary)" th:text="${rx.medication}">—</td>
            <td><span class="badge badge-amber" th:text="${rx.dose}">—</span></td>
            <td th:text="${rx.date}">—</td>
            <td th:text="${rx.appointment}">—</td>
          </tr>
          <tr th:if="${#lists.isEmpty(prescribes)}">
            <td colspan="6">
              <div class="empty-state">
                <div class="empty-icon">📭</div>
                <p>No prescriptions found</p>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
