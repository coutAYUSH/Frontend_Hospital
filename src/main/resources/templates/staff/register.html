<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register Staff — MediCare HMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{layout/sidebar :: sidebar(${activeTab}, ${role}, ${userEmail})}"></div>

    <main class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h1>➕ Register New Staff</h1>
                <p>Create a new hospital staff account</p>
            </div>
            <span class="topbar-badge" th:text="${role ?: 'STAFF'}">STAFF</span>
        </div>

        <div class="page-content">
            <div class="card" style="max-width:600px; margin:0 auto;">
                <div class="card-header">
                    <h3>👤 New Staff Registration</h3>
                </div>
                <div class="card-body">

                    <div class="alert-success" th:if="${message != null}">
                        ✅ <span th:text="${message}">Success</span>
                    </div>

                    <form th:action="@{/staff/register}" method="post" id="registerForm">
                        <div class="form-group">
                            <label class="form-label" for="regName">Full Name</label>
                            <input type="text" id="regName" name="name" class="form-control"
                                   placeholder="Dr. John Smith" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regEmail">Email Address</label>
                            <input type="email" id="regEmail" name="email" class="form-control"
                                   placeholder="staff@hospital.com" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regPassword">Password</label>
                            <input type="password" id="regPassword" name="password" class="form-control"
                                   placeholder="••••••••" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regRole">Role</label>
                            <select id="regRole" name="role" class="form-control" required>
                                <option value="">— Select Role —</option>
                                <option value="NURSE">Nurse</option>
                                <option value="PHYSICIAN">Physician</option>
                                <option value="STAFF">Staff</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regPosition">Position / Title</label>
                            <input type="text" id="regPosition" name="position" class="form-control"
                                   placeholder="e.g. Head Nurse, Senior Physician"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regSsn">SSN</label>
                            <input type="number" id="regSsn" name="ssn" class="form-control"
                                   placeholder="Social Security Number"/>
                        </div>
                        <button type="submit" class="btn btn-success" style="width:100%;padding:12px;" id="registerBtn">
                            ✅ Register Staff Member
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
