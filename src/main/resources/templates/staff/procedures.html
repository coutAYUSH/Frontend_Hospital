<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Procedures — MediCare HMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{layout/sidebar :: sidebar(${activeTab}, ${role}, ${userEmail})}"></div>

    <main class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h1>🔬 All Procedures</h1>
                <p>All available medical procedures and costs</p>
            </div>
            <span class="topbar-badge" th:text="${role ?: 'STAFF'}">STAFF</span>
        </div>

        <div class="page-content">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Code</th>
                        <th>Procedure Name</th>
                        <th>Cost</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="proc, iStat : ${procedures}">
                        <td th:text="${iStat.count}" style="color:var(--text-muted)"></td>
                        <td><span class="badge badge-purple" th:text="${proc.code}">—</span></td>
                        <td style="font-weight:500;color:var(--text-primary)" th:text="${proc.name}">—</td>
                        <td>
                            <span class="badge badge-green"
                                  th:text="${proc.cost != null ? '$' + proc.cost : '—'}">—</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(procedures)}">
                        <td colspan="4">
                            <div class="empty-state">
                                <div class="empty-icon">📭</div>
                                <p>No procedures found</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
